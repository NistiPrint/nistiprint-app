# Docker Compose - Geração 2 (V2) - Core & Frontend
# Use este arquivo para subir a versão estável atual.
# As imagens devem ser construídas e enviadas para o Docker Hub antes.

networks:
  gateway_net:
    external: true
  app-internal:
    external: true

services:
  # --- BACKEND CORE V2 ---
  # Esta imagem serve tanto como API quanto como Worker.
  # No Portainer, você pode duplicar o serviço alterando apenas o comando de execução.
  nistiprint-core-v2:
    image: leandrogbreve/nistiprint-core:v1.0.0
    container_name: nistiprint-api-v2
    restart: unless-stopped
    networks:
      - gateway_net
      - app-internal
    environment:
      - FLASK_ENV=production
      - DATABASE_MODE=supabase
      # Adicione as outras variáveis de ambiente necessárias aqui ou via .env
    expose:
      - "8080"
    # Command para API: ["gunicorn", "-b", "0.0.0.0:8080", "main:app"]

  nistiprint-worker-v2:
    image: leandrogbreve/nistiprint-core:v1.0.0
    container_name: nistiprint-worker-v2
    restart: unless-stopped
    networks:
      - app-internal
    environment:
      - FLASK_ENV=production
      - DATABASE_MODE=supabase
    # Command para Worker: ["celery", "-A", "tasks", "worker", "--loglevel=info"]

  # --- FRONTEND REACT V2 ---
  nistiprint-frontend-v2:
    image: leandrogbreve/nistiprint-frontend:v1.0.0
    container_name: nistiprint-frontend-v2
    restart: unless-stopped
    networks:
      - gateway_net
    expose:
      - "80"
