# .github/workflows/deploy.yml para nistiprint-frontend
name: Deploy Frontend to Production

on:
  push:
    branches:
      - main # Dispara o workflow em push para a branch main

jobs:
  build_and_push: # Novo job para construir e enviar a imagem
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push frontend image
        run: |
          # Navega para o diretório do frontend para garantir que o contexto de build esteja correto
          cd nistiprint-frontend
          docker build \
            --build-arg VITE_API_URL="${{ secrets.VITE_API_URL }}" \
            --build-arg VITE_SUPABASE_URL="${{ secrets.VITE_SUPABASE_URL }}" \
            --build-arg VITE_SUPABASE_ANON_KEY="${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -t leandrogbreve/nistiprint-frontend:latest . # O '.' aqui significa o contexto atual (nistiprint-frontend)
          docker push leandrogbreve/nistiprint-frontend:latest
    outputs: # Output para que o próximo job dependa do sucesso deste
      image_pushed: true

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push # Este job só roda se o build_and_push for bem-sucedido

    steps:
      - name: Checkout code
        uses: actions/checkout@v3 # Necessário para ter o docker-compose.prod.yml acessível para o SSH

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Caminho no servidor onde o repositório nistiprint-frontend estará.
            # Certifique-se de que o repositório esteja clonado/presente neste diretório.
            # Certifique-se que o docker-compose.prod.yml está no servidor neste caminho.
            cd /root/nistiprint-frontend # AJUSTE ESTE CAMINHO conforme seu servidor

            echo "Stopping and removing existing frontend stack..."
            # CORREÇÃO: Especifique o arquivo docker-compose.prod.yml para o down command.
            docker compose -f docker-compose.prod.yml down --remove-orphans || true

            echo "Pulling latest frontend image..."
            # Puxa a imagem mais recente que foi construída e enviada no job anterior.
            docker compose -f docker-compose.prod.yml pull frontend

            echo "Starting new frontend stack..."
            # CORREÇÃO: Remova --build e todos os --build-arg daqui.
            # A imagem já foi construída com as variáveis e puxada.
            # O `up` irá usar a imagem mais recente que foi puxada.
            docker compose -f docker-compose.prod.yml up -d --force-recreate
            echo "Frontend stack deployment initiated."
