# =======================================================
# NISTIPRINT - DOCKER COMPOSE LOCAL (DESENVOLVIMENTO)
# =======================================================
# Uso: docker-compose -f docker-compose.local.yml up --build -d
# =======================================================

version: '3.8'

services:
  # --- INFRA ESTRUTURA ---
  redis:
    image: redis:7-alpine
    container_name: local-nistiprint-redis
    restart: unless-stopped
    networks:
      - nistiprint-local
    command: redis-server --appendonly yes
    volumes:
      - redis_local_data:/data

  # --- BACKEND API ---
  api:
    image: leandrogbreve/nistiprint-api:latest
    container_name: local-nistiprint-api
    restart: unless-stopped
    networks:
      - nistiprint-local
    ports:
      - "8080:8080"
    environment:
      - FLASK_ENV=development
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - FIREBASE_CREDENTIALS=${FIREBASE_CREDENTIALS}
    env_file:
      - .env
    depends_on:
      - redis
    command: python main.py

  # --- WORKER ---
  worker:
    image: leandrogbreve/nistiprint-worker:latest
    container_name: local-nistiprint-worker
    restart: unless-stopped
    networks:
      - nistiprint-local
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_HOST=redis
      - FIREBASE_CREDENTIALS=${FIREBASE_CREDENTIALS}
    env_file:
      - .env
    depends_on:
      - redis
    command: celery -A worker_entrypoint worker --loglevel=info --concurrency=2

  celery-beat:
    image: leandrogbreve/nistiprint-worker:latest
    container_name: local-nistiprint-beat
    restart: unless-stopped
    networks:
      - nistiprint-local
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_HOST=redis
      - FIREBASE_CREDENTIALS=${FIREBASE_CREDENTIALS}
    env_file:
      - .env
    depends_on:
      - redis
    command: celery -A worker_entrypoint beat --loglevel=info

  # --- FRONTEND ---
  frontend:
    image: leandrogbreve/nistiprint-frontend:latest
    container_name: local-nistiprint-frontend
    restart: unless-stopped
    networks:
      - nistiprint-local
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=/api
    depends_on:
      - api

networks:
  nistiprint-local:
    name: local-nistiprint-network
    driver: bridge

volumes:
  redis_local_data:
    name: local-nistiprint-redis-data
