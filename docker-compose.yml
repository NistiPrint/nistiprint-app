# ===========================================
# NISTIPRINT - APPLICATION STACK (FRONTEND & API)
# ===========================================
# Arquitetura: Flask API + React Frontend
# Depende da stack 'nistiprint-core' (Redis)
# ===========================================

version: '3.8'

services:
  # ===========================================
  # FRONTEND (React/Vite)
  # ===========================================
  frontend:
    image: leandrogbreve/nistiprint-frontend:latest
    container_name: nistiprint-app-frontend
    restart: unless-stopped
    networks:
      - gateway_net
      - nistiprint-shared
    environment:
      - VITE_API_URL=/api
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "10"
        compress: "true"

  # ===========================================
  # API (Flask)
  # ===========================================
  api:
    image: leandrogbreve/nistiprint-api:latest
    container_name: nistiprint-app-api
    restart: unless-stopped
    networks:
      - gateway_net
      - nistiprint-shared
    ports:
      - "8080:8080"
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - SECRET_KEY=${SECRET_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - FIREBASE_CREDENTIALS=${FIREBASE_CREDENTIALS}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SHOPEE_PARTNER_ID=${SHOPEE_PARTNER_ID}
      - SHOPEE_PARTNER_KEY=${SHOPEE_PARTNER_KEY}
    command: python main.py
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "10"
        compress: "true"

  # ===========================================
  # WORKER - DEFAULT QUEUE
  # ===========================================
  worker:
    image: leandrogbreve/nistiprint-api:latest
    container_name: nistiprint-app-worker
    restart: unless-stopped
    networks:
      - nistiprint-shared
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - SECRET_KEY=${SECRET_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - FIREBASE_CREDENTIALS=${FIREBASE_CREDENTIALS}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SHOPEE_PARTNER_ID=${SHOPEE_PARTNER_ID}
      - SHOPEE_PARTNER_KEY=${SHOPEE_PARTNER_KEY}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    command: celery -A worker_entrypoint worker --loglevel=info --queues=default
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "10"
        compress: "true"

  # ===========================================
  # WORKER - AI PERSONALIZATION QUEUE
  # ===========================================
  worker-ai:
    image: leandrogbreve/nistiprint-api:latest
    container_name: nistiprint-app-worker-ai
    restart: unless-stopped
    networks:
      - nistiprint-shared
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - SECRET_KEY=${SECRET_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - FIREBASE_CREDENTIALS=${FIREBASE_CREDENTIALS}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SHOPEE_PARTNER_ID=${SHOPEE_PARTNER_ID}
      - SHOPEE_PARTNER_KEY=${SHOPEE_PARTNER_KEY}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    command: celery -A worker_entrypoint worker --loglevel=info --queues=ai_personalization
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "10"
        compress: "true"

  # ===========================================
  # WORKER - BLING STATUS SYNC QUEUE
  # ===========================================
  worker-bling:
    image: leandrogbreve/nistiprint-api:latest
    container_name: nistiprint-app-worker-bling
    restart: unless-stopped
    networks:
      - nistiprint-shared
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - SECRET_KEY=${SECRET_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - FIREBASE_CREDENTIALS=${FIREBASE_CREDENTIALS}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SHOPEE_PARTNER_ID=${SHOPEE_PARTNER_ID}
      - SHOPEE_PARTNER_KEY=${SHOPEE_PARTNER_KEY}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    command: celery -A worker_entrypoint worker --loglevel=info --queues=bling_status_sync
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "10"
        compress: "true"

networks:
  gateway_net:
    external: true
  nistiprint-shared:
    external: true
    name: nistiprint-shared
