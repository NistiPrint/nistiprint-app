# ===========================================
# NISTIPRINT - DOCKER COMPOSE (MONOREPO)
# ===========================================
# Arquitetura: API + Worker + Frontend + Redis
# Sincronizado com a versão estável da raiz.
# ===========================================

version: '3.8'

services:
  # ===========================================
  # FRONTEND (React/Vite)
  # ===========================================
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: nistiprint-app-frontend
    restart: unless-stopped
    networks:
      - app-internal
      # - gateway_net # Reativar se usar proxy reverso externo
    depends_on:
      - api
    environment:
      - VITE_API_URL=/api

  # ===========================================
  # API (Flask)
  # ===========================================
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: nistiprint-app-api
    restart: unless-stopped
    networks:
      # - gateway_net
      - app-internal
    ports:
      - "8080:8080"
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - SECRET_KEY=${SECRET_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    command: python main.py

  # ===========================================
  # WORKER (Celery)
  # ===========================================
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: nistiprint-app-worker
    restart: unless-stopped
    networks:
      - app-internal
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
    depends_on:
      - redis
    command: celery -A worker_entrypoint worker --loglevel=info --concurrency=2

  # ===========================================
  # BEAT (Celery Scheduler)
  # ===========================================
  beat:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: nistiprint-app-beat
    restart: unless-stopped
    networks:
      - app-internal
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
    depends_on:
      - redis
    command: celery -A worker_entrypoint beat --loglevel=info

networks:
  # gateway_net:
  #   name: gateway_net
  #   external: true
  app-internal:
    name: app-internal
    external: true # Agora é externa

# ===========================================
# VOLUMES
# ===========================================
volumes:
  redis_data:
    name: nistiprint-redis-data # Mantém a referência ao volume externo
