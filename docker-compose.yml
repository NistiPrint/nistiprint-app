# ===========================================
# NISTIPRINT - APPLICATION STACK (FRONTEND & API)
# ===========================================
# Arquitetura: Flask API + React Frontend
# Depende da stack 'nistiprint-core' (Redis)
# ===========================================

version: '3.8'

services:
  # ===========================================
  # FRONTEND (React/Vite)
  # ===========================================
  frontend:
    image: leandrogbreve/nistiprint-frontend:latest
    container_name: nistiprint-app-frontend
    restart: unless-stopped
    networks:
      - gateway_net
      - nistiprint-shared
    environment:
      - VITE_API_URL=/api
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "10"
        compress: "true"

  # ===========================================
  # API (Flask)
  # ===========================================
  api:
    image: leandrogbreve/nistiprint-api:latest
    container_name: nistiprint-app-api
    restart: unless-stopped
    networks:
      - gateway_net
      - nistiprint-shared
    ports:
      - "8080:8080"
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - SECRET_KEY=${SECRET_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - FIREBASE_CREDENTIALS=${FIREBASE_CREDENTIALS}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    command: python main.py
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "10"
        compress: "true"

networks:
  gateway_net:
    external: true
  nistiprint-shared:
    external: true
    name: nistiprint-shared
