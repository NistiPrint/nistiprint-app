# nistiprint-frontend/nginx.conf
# Configuração para servir o frontend React/Vite quando acessado via Nginx Proxy Manager
# O NPM faz o proxy do domínio app.nistiprint.neolabs.com.br para este container na porta 80

server {
    listen 80;
    server_name _;
    root   /usr/share/nginx/html;
    index  index.html;

    # Compressão gzip para melhor performance
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;

    # Cache para assets estáticos (JS, CSS, imagens)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Serve o frontend React SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
