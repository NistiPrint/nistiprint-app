{% extends "layouts/base.html" %}

{% block title %}Associar Componente em Massa{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-md-10 offset-md-1">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">
                        <i class="fas fa-link"></i> Associar '{{ component.get('name', 'Componente') }}' a outros produtos
                    </h3>
                </div>
                <div class="card-body">
                    <form id="search-form">
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label for="product-name" class="form-label">Nome do Produto</label>
                                <input type="text" class="form-control" id="product-name" name="name">
                            </div>
                            <div class="col-md-4">
                                <label for="category-select" class="form-label">Categoria</label>
                                <select class="form-control" id="category-select" name="category_id">
                                    <option value="">Todas</option>
                                    {% for category in categories %}
                                        <option value="{{ category.id }}">{{ category.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label for="tag-select" class="form-label">Tag</label>
                                <select class="form-control" id="tag-select" name="tag_id">
                                    <option value="">Todas</option>
                                    {% for tag in tags %}
                                        <option value="{{ tag.id }}">{{ tag.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary"><i class="fas fa-search"></i> Pesquisar</button>
                    </form>

                    <hr>

                    <div class="mt-4">
                        <h4>Resultados da Pesquisa</h4>
                        <form id="bulk-associate-form">
                            <input type="hidden" name="component_id" value="{{ component_id }}">
                            <div class="table-responsive">
                                <table class="table table-striped table-hover" id="results-table">
                                    <thead>
                                        <tr>
                                            <th>Produto</th>
                                            <th>SKU</th>
                                            <th style="width: 150px;">Quantidade</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <!-- Resultados serão carregados aqui via JS -->
                                    </tbody>
                                </table>
                            </div>
                            <button type="submit" class="btn btn-success mt-3"><i class="fas fa-save"></i> Salvar Associação em Massa</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% block scripts %}
<script src="{{ url_for('static', filename='js/produtos/associate_component.js') }}"></script>
{% endblock %}
