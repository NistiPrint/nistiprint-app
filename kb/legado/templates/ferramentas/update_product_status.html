{% extends 'layouts/base.html' %}

{% block content %}
<div class="container">
    <h1>Update Product Status</h1>
    <p>Click the button below to update all products to 'ativo' status.</p>
    <button id="updateBtn" class="btn btn-primary">Update Products</button>
    <div id="result" class="mt-3"></div>
</div>

<script>
    document.getElementById('updateBtn').addEventListener('click', function() {
        fetch('/ferramentas/update_product_status')
            .then(response => response.json())
            .then(data => {
                let resultDiv = document.getElementById('result');
                if (data.success) {
                    resultDiv.innerHTML = `<div class="alert alert-success">${data.message}</div>`;
                } else {
                    resultDiv.innerHTML = `<div class="alert alert-danger">${data.message}</div>`;
                }
            })
            .catch(error => {
                document.getElementById('result').innerHTML = `<div class="alert alert-danger">An error occurred: ${error}</div>`;
            });
    });
</script>
{% endblock %}
