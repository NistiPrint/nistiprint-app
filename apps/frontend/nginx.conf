# nistiprint-frontend/nginx.conf
# Configuração para servir o frontend React/Vite quando acessado via Nginx Proxy Manager
# O NPM faz o proxy do domínio app.nistiprint.neolabs.com.br para este container na porta 80

server {
    listen 80;
    server_name _;
    root   /usr/share/nginx/html;
    index  index.html;

    # Compressão gzip para melhor performance
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;

    # Cache para assets estáticos (JS, CSS, imagens)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Resolver DNS do Docker (127.0.0.11)
    resolver 127.0.0.11 valid=30s;

    # Proxy para a API Flask
    # Colocado antes do location / para garantir precedência
    location /api {
        set $upstream_api http://api:8080;
        proxy_pass $upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }

    # Serve o frontend React SPA
    location / {
        try_files $uri $uri/ /index.html;
        # Garante que não haja cache no index.html para evitar versões antigas do app
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Redirecionamento explícito caso alguém ainda acesse /frontend/
    location /frontend/ {
        rewrite ^/frontend/(.*)$ /$1 permanent;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
