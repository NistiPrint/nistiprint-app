# Docker Compose - Geração 3 (V3) - Microserviços
# ATENÇÃO: O build deve ser feito da raiz:
# docker build -t leandrogbreve/nistiprint-api:v2.0.0 -f ./nistiprint-api/Dockerfile .
# docker build -t leandrogbreve/nistiprint-worker:v2.0.0 -f ./nistiprint-worker/Dockerfile .

networks:
  gateway_net:
    external: true
  app-internal:
    external: true

services:
  # --- API V3 ---
  nistiprint-api-v3:
    image: leandrogbreve/nistiprint-api:v2.0.0
    container_name: nistiprint-api-v3
    restart: unless-stopped
    networks:
      - gateway_net
      - app-internal
    environment:
      - FLASK_ENV=production
      - DATABASE_MODE=supabase
      - REDIS_URL=redis://nistiprint-redis:6379/0
      # Outras variáveis .env
    expose:
      - "8080"

  # --- WORKER V3 ---
  nistiprint-worker-v3:
    image: leandrogbreve/nistiprint-worker:v2.0.0
    container_name: nistiprint-worker-v3
    restart: unless-stopped
    networks:
      - app-internal
    environment:
      - CELERY_BROKER_URL=redis://nistiprint-redis:6379/0
      - CELERY_RESULT_BACKEND=redis://nistiprint-redis:6379/0
      - DATABASE_MODE=supabase
