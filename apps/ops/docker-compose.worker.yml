# ===========================================
# NISTIPRINT - WORKER & BEAT
# ===========================================
# Celery Worker + Beat Scheduler
# ===========================================
# ⚠️  IMPORTANTE: Esta stack depende do Redis!
#
# ORDEM DE DEPLOY:
#   1. Primeiro: nistiprint-infra (redis + n8n)
#   2. Aguarde Redis estar "Running" (~30s)
#   3. Depois: esta stack (worker + beat)
#
# Se o worker ficar em "Restarting", verifique:
#   docker ps | findstr nistiprint-redis
# ===========================================

version: '3.8'

services:
  # ===========================================
  # WORKER (Celery)
  # ===========================================
  # Processa filas de:
  # - Webhooks (Bling, Shopee)
  # - Sincronização de estoque
  # - Personalização com IA
  # - Processamento de pedidos
  # ===========================================
  worker:
    image: leandrogbreve/nistiprint-worker:latest
    container_name: nistiprint-app-worker
    restart: unless-stopped
    networks:
      - nistiprint-shared
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - FIREBASE_CREDENTIALS=${FIREBASE_CREDENTIALS}
    # Redis está em outra stack - depende apenas da rede
    command: celery -A worker_entrypoint worker --loglevel=info --concurrency=2
    # Health check simplificado - verifica se o processo celery está rodando
    # celery inspect ping pode falhar mesmo com worker saudável
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery.*worker' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    # Retry infinito até o Redis estar disponível
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ===========================================
  # BEAT (Celery Scheduler)
  # ===========================================
  # Agenda tarefas periódicas:
  # - Limpeza de filas
  # - Relatórios agendados
  # - Sync de status
  # ===========================================
  beat:
    image: leandrogbreve/nistiprint-worker:latest
    container_name: nistiprint-app-beat
    restart: unless-stopped
    networks:
      - nistiprint-shared
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - FIREBASE_CREDENTIALS=${FIREBASE_CREDENTIALS}
    # Redis está em outra stack - depende apenas da rede
    command: celery -A worker_entrypoint beat --loglevel=info
    # Health check simplificado - verifica se o processo beat está rodando
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery.*beat' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  nistiprint-shared:
    name: nistiprint-shared
    external: true
